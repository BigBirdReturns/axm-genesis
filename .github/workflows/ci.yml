# CI for AXM Genesis (v1, RFC 0002).
#
# This workflow enforces the promises in CONTRIBUTING.md:
#   1. The committed gold-shard v2 bytes pass verification on every push/PR
#      (job: gold-shard). If a verifier change breaks the gold shard, this
#      job fails and the change is rejected.
#   2. The conformance suite passes — twice, with the test files collected
#      in both orders, so no test can depend on module-level pollution from
#      an earlier file (job: test).
#   3. With no ML-DSA-44 backend installed, the kernel fails loudly and
#      cleanly instead of pretending to verify (job: no-backend).
#   4. Lint is blocking (job: lint).
#
# The gold shard's bytes are additionally pinned by shards/gold/CHECKSUMS.sha256:
# any modification to the frozen bytes fails the checksum guard even if the
# modified shard would still verify.

name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Conformance suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        # dev extras carry pytest + dilithium-py (ML-DSA-44 backend);
        # blake3/pynacl/click are the only core dependencies.
        run: pip install -e ".[dev]"

      - name: Run conformance suite
        run: python -m pytest tests/ -q

      - name: Run conformance suite (reversed file order)
        # Order-independence guard: reload-based backend tests must restore
        # reality, so the suite passes no matter which file runs first.
        run: python -m pytest -q -p no:cacheprovider $(ls tests/test_*.py | sort -r)

  no-backend:
    name: No ML-DSA-44 backend (clean failure mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev extras, then remove the backend
        run: |
          pip install -e ".[dev]"
          pip uninstall -y dilithium-py

      - name: Backend-independent kernel tests still pass
        # identity/merkle/jsonl need no ML-DSA; test_sign's roundtrip tests
        # skip and its backend-missing tests assert the clean RuntimeError.
        run: python -m pytest tests/test_sign.py tests/test_identity.py tests/test_merkle.py tests/test_jsonl.py -q

      - name: Verifier fails loudly and cleanly without a backend
        # Verifying a real shard must surface the install guidance — never
        # exit 0 and never mislabel the condition as a bad signature.
        run: |
          set +e
          output=$(axm-verify shard tests/vectors/shards/valid/minimal/shard \
                     --trusted-key tests/keys/ci_test_publisher.pub 2>&1)
          rc=$?
          set -e
          echo "axm-verify exited with code $rc"
          test "$rc" -ne 0
          echo "$output" | grep -q "No ML-DSA-44 backend installed"
          echo "$output" | grep -q "pip install dilithium-py"

  gold-shard:
    name: Gold shard v2 (frozen bytes + verification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Frozen-bytes guard (checksums of shards/gold/**)
        # The gold shard is never regenerated. Any change to the committed
        # bytes fails here, before verification even runs.
        run: sha256sum -c shards/gold/CHECKSUMS.sha256

      - name: Verify gold shard v2 with the reference verifier
        # If a verifier change breaks the gold shard, this fails and the
        # verifier change is rejected (CONTRIBUTING.md, Gold Shard Policy).
        run: |
          set +e
          make verify-gold
          rc=$?
          set -e
          echo "make verify-gold exited with code $rc (expected 0)"
          test "$rc" -eq 0

  lint:
    name: Lint (ruff, blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        # ruff is in the dev extras, but install it directly so lint does not
        # depend on building the package.
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/
